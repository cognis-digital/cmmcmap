apiVersion: apps/v1
kind: Deployment
metadata: { name: cmmcmap, labels: { app: cmmcmap } }
spec:
  replicas: 1
  selector: { matchLabels: { app: cmmcmap } }
  template:
    metadata: { labels: { app: cmmcmap } }
    spec:
      containers:
        - name: cmmcmap
          image: ghcr.io/cognis-digital/cmmcmap:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: cmmcmap }
spec:
  selector: { app: cmmcmap }
  ports: [{ port: 80, targetPort: 8000 }]
